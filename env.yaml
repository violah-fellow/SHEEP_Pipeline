# environment.yml
name: sheep
channels:
  - pytorch
  - conda-forge
  - pip
  - defaults
dependencies:
  - python=3.12
  - pip
  - pytorch>=2.6 # transformers>=4.57 requires torch>=2.6 to load non-safetensors checkpoints (CVE-2025-32434)
  - cpuonly # remove this line and uncomment pytorch-cuda below to use GPU
  # - pytorch-cuda=12.1 # uncomment (and remove cpuonly above) for GPU if available
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - python-duckdb # DuckDB for SQL
  - ipykernel
  - scikit-learn
  - joblib # For saving models and parallel processing
  - tqdm # Progress bars
  - anthropic>=0.103.0 # Anthropic API client (0.103.0 verified working with messages.parse())
  - pydantic>=2.0 # Structured output schemas; also a dependency of anthropic
  - python-dotenv # For loading environment variables from .env files
  - openpyxl # Excel file support for pandas
  - rapidfuzz # Fuzzy string matching
  - pip:
    - dimcli # Dimensions API client
    - transformers # Hugging Face Transformers for NLP # worth adding ==4.57.6 as this version is compatible with sentence-transformers 2.2.2 and adapters 3.0.0
    - sentence-transformers # Sentence Transformers for embeddings
    - adapters # AdapterHub adapters for SPECTER2 embedding model (S2_ML_classification.py)
    - pycountry # Country information for NLP



